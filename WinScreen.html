<HTML>
    <HEAD>
    <TITLE>You Win!</TITLE>
		<STYLE>
			*{
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				font-family: "Times New Roman", Times, serif;
			}

			body{
				min-height: 100vh;
				background: #f4f6f8;
				display: flex;
				justify-content: center;
				align-items: center;
				padding: 24px;
			}

			.wrapper{
				width: min(95vw, 1200px);
				display: flex;
				justify-content: center;
			}

			.card{
				width: 100%;
				max-width: 800px;
				background: #ffffff;
				border-radius: 14px;
				box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
				padding: 50px 30px;
				text-align: center;
				position: relative;
			}
			
			.hamburgerMenu{
				position: absolute;
				top: 14px;
				right: 14px;
			}

			.menuButton{
				width: 46px;
				height: 46px;
				border: 1px solid #000;
				background: #ffffff;
				cursor: pointer;
				border-radius: 8px;
				font-size: 24px;
			}

			.menuBody{
				position: absolute;
				top: 66px;
				right: 14px;
				width: 190px;
				background: #ffffff;
				border: 1px solid #000;
				border-radius: 8px;
				box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
				display: none;
				z-index: 10;
				overflow: hidden;
			}

			.menuBody button{
				width: 100%;
				padding: 12px;
				border: none;
				border-bottom: 1px solid #d9d9d9;
				background: #ffffff;
				text-align: left;
				cursor: pointer;
				font-size: 16px;
			}

			.menuBody button:last-child{
				border-bottom: none;
			}

			.menuBody button:hover{
				background: #f2f2f2;
			}

			.text{
				font-size: 48px;
				margin-bottom: 10px;
			}

			.sub{
				font-size: 28px;
				margin-bottom: 30px;
				color: #333;
			}

			.button{
				padding: 12px 24px;
				font-size: 18px;
				border: 1px solid #000;
				border-radius: 8px;
				background: #ffffff;
				cursor: pointer;
				transition: all 0.2s ease;
			}

			.button:hover{
				background: #f2f2f2;
				transform: scale(1.05);
			}
		</STYLE>
    </HEAD>
	<BODY>
		<div class = "wrapper">
			<div class = "card">
				
				<div class = "hamburgerMenu">
					<button class = "menuButton" onclick = "hamburger()">☰</button>
				</div>
				
				<div id = "menuBody" class = "menuBody">
					<button onclick = "Map()">Map</button>
					<button onclick = "Leaderboard()">Leaderboard</button>
				</div>
				
				<H1 class = "text">Congratulations!</H1>
				<H1 class = "sub">Claim Your Prize!</H1>
				
				<button class = "button" onclick = "Prize()">Claim</button>
			</div>
		</div>
		<SCRIPT>
			function hamburger(){
				const menu = document.getElementById("menuBody");
				
				if(menu.style.display == "block"){
					menu.style.display = "none";
				}else{
					menu.style.display = "block";
				}
			}
			
			function Map(){
				window.location.href = "GoogleAPI.html";
			}
			
			function Leaderboard(){
				window.location.href = "Leaderboard.html";
			}
			
			function Prize(){
				window.location.href = "Leaderboard.html";
			}
		</SCRIPT>
	</BODY>
</HTML>
