
  <style>
    body { font-family: Arial; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
    th, td { border: 1px solid black; padding: 10px; text-align: center; }
    th { background-color: #f2f2f2; }
    .controls { margin-bottom: 20px; }
    button { margin: 2px; }



    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    h2 {

      text-align: center;

    }

    /* animation */
    tr {
    }

    /* add a specific class for the transition period */
    .animating {
      transition: transform 0.8s ease, background-color 0.8s;
    }

    .moving-up {
      background-color: #d4edda !important; /* green; meaning, promoted */
    }

    .moving-down {
      background-color: #f8d7da !important; /* red; meaning, it has been demoted */
    }
  </style>
