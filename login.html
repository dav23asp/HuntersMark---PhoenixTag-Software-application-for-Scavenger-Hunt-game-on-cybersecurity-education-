<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PhoenixTag Login</title>
    <script src="Data.js"></script>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Times New Roman", Times, serif;
        }

        body{
            min-height: 100vh;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 24px;
        }

        .wrapper{
            width: min(95vw, 1200px);
            display: flex;
            justify-content: center;
        }

        .card{
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            padding: 14px;
            position: relative;
        }

        .pageTitle{
            font-size: 32px;
            text-align: center;
            margin-bottom: 24px;
        }

        .display{
            border: 1px solid #000;
            border-radius: 10px;
            padding: 20px;
            background: #fafafa;
            max-width: 550px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input{
            width: 100%;
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input label{
            font-size: 20px;
            margin-bottom: 8px;
            text-align: center;
        }

        .input input{
            width: 70%;
            max-width: 400px;
            padding: 10px;
            font-size: 18px;
            border: 1px solid #000;
            border-radius: 6px;
            text-align: center;
        }

        .loginButton{
            padding: 10px 18px;
            border: 1px solid #000;
            background: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .loginButton:hover{
            background: #f2f2f2;
        }
    </style>
    <script>
        class main {
            constructor() {
                this.userCount = 0;
                this.users = [];
                this.users.push(new User("mberg", "1234ddffss&", this.userCount));
                this.userCount++;
                this.users.push(new User("dserr", "rreerree4433##ccDDsSdaL", this.userCount));
                this.userCount++;
                this.users.push(new User("smurr", "54321ttEDS%$ddd", this.userCount));
                this.userCount++;
            }

            login() {
                const inputElement1 = document.getElementById("username");
                const username = inputElement1.value;
                const inputElement2 = document.getElementById("password");
                const password = inputElement2.value;
                this.userCount++;
                for(let i = 0; i < this.userCount; i++) {
                    if(username == this.users[i].username && password == this.users[i].password){
                        window.location.replace("MainFile.html");
                    }
                }
            }
        }

        m = new main();
    </script>
</head>
<body>
<div class = "wrapper">
    <div class = "card">

        <h1 class = "pageTitle">Log In</h1>

        <div class = "display">
            <div class = "input">
                <label for = "username">Username</label>
                <input type = "text" id = "username" name = "username">
            </div>

            <div class = "input">
                <label for = "password">Password</label>
                <input type = "text" id = "password" name = "password">
            </div>

            <button class = "loginButton" onclick = "m.login()">Login</button>
        </div>

    </div>
</div>

</body>
</html>
